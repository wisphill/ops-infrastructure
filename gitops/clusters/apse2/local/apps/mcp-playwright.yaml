apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-playwright
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wisphill/ops-infrastructure
    targetRevision: main
    path: gitops/clusters/apse2/local/platform/mcp-playwright
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-playwright
  syncPolicy: {}
