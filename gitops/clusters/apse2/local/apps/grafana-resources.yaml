apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wisphill/ops-infrastructure
    targetRevision: main
    path: gitops/clusters/apse2/local/platform/monitoring/grafana

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy: {}
