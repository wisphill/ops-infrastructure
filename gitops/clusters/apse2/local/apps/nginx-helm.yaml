apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.1

    helm:
      values: |
        controller:
          service:
            type: LoadBalancer
            # fixed metal LB IP for the Nginx ingress controller
            loadBalancerIP: 172.18.255.200
          # set default ingress class to nginx
          ingressClassResource:
            name: nginx
            enabled: true
            default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
