apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflows-sso-user
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'authentik Admins' in groups"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflows-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: argo-workflows-sso-user
    namespace: argo-workflows
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflows-sso-user.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: argo-workflows-sso-user
type: kubernetes.io/service-account-token
