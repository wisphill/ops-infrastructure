apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wisphill/ops-infrastructure
    targetRevision: main
    path: gitops/clusters/apse2/local/argo-workflows
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-workflows
  syncPolicy: {}
