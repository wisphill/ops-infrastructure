apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.47.4

    helm:
      values: |
        server:
          service:
            type: ClusterIP
          authModes:
            - sso
          sso:
            enabled: true
            scopes:
              - openid
              - profile
              - email
              - groups
            issuer: https://authentik.opswork.io.vn/application/o/argoworkflows/
            clientId:
              name: argo-workflows-secret-keys
              key: SSO_CLIENT_ID
            clientSecret:
              name: argo-workflows-secret-keys
              key: SSO_CLIENT_SECRET
            redirectUrl: https://argo-workflows.opswork.io.vn/oauth2/callback

          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - argo-workflows.opswork.io.vn

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-workflows

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
