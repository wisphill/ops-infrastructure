apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    theme:
      custom-css: /app/config/custom.css
    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: search
                search-engine: duckduckgo
              - type: clock
                hour-format: 24h
          - size: full
            widgets:
              - type: monitor
                cache: 1m
                title: Services
                services:
                  - name: Porfolio
                    icon: si:homeassistant
                    url: https://phil.opswork.io.vn
                    check-url: https://phil.opswork.io.vn

                  - name: Grafana
                    icon: si:immich
                    url: https://grafana.opswork.io.vn
                    check-url: https://grafana.opswork.io.vn

                  - name: Zigbee2MQTT
                    icon: si:zigbee
                    url: https://zigbee.example.com
                    check-url: https://zigbee.example.com

                  - name: Nginx
                    icon: si:nginx
                    url: https://nginx.example.com
                    check-url: https://nginx.example.com

                  - name: Grafana
                    icon: si:grafana
                    url: https://grafana.example.com
                    check-url: https://grafana.example.com

                  - name: TeslaMate
                    icon: si:tesla
                    url: https://teslamate.example.com
                    check-url: https://teslamate.example.com

                  - name: Portainer
                    icon: si:portainer
                    url: https://portainer.example.com
                    check-url: https://portainer.example.com

                  - name: InfluxDB
                    icon: si:influxdb
                    url: https://influx.example.com
                    check-url: https://influx.example.com

                  - name: What's Up Docker
                    icon: si:docker
                    url: https://wud.example.com
                    check-url: https://wud.example.com
          - size: full
            widgets:
              - type: bookmarks
                groups:
                  - title: Infrastructure
                    links:
                      - title: ArgoCD
                        url: https://argocd.example.com
                      - title: Grafana
                        url: https://grafana.example.com
                      - title: Prometheus
                        url: https://prometheus.example.com
  custom.css: |
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

    body {
      font-family: 'IBM Plex Mono', monospace !important;
    }
