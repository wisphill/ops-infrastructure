apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: search
                search-engine: duckduckgo
              - type: clock
                hour-format: 24h

          - size: full
            widgets:
              - type: bookmarks
                groups:
                  - title: Infrastructure
                    links:
                      - title: ArgoCD
                        url: https://argocd.example.com
                      - title: Grafana
                        url: https://grafana.example.com
                      - title: Prometheus
                        url: https://prometheus.example.com
