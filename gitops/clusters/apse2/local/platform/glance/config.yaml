apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    server:
      assets-path: /app/assets
    theme:
      custom-css-file: /assets/custom.css
    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: clock
                hour-format: 24h
              - type: custom-api
                title: GitHub Repositories
                url: https://api.github.com/user/repos
                cache: 30m
                parameters:
                  affiliation: owner
                  sort: updated
                  visibility: all
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github.v3+json
                  User-Agent: Glance-Dashboard
                template: |
                  <div class="github-repos">
                    <ul class="list list-gap-14 collapsible-container" data-collapse-after="5">
                      {{ range .JSON.Array "" }}
                        <li>
                          <a class="size-h3 color-primary" href="{{ .String "html_url" }}">{{ .String "full_name" }}</a>
                          <h3><a href="" target="_blank"></a></h3>
                          <p>{{ .String "description" }}</p>
                          <ul class="list-horizontal-text device-info">
                            <li data-popover-type="html"><div data-popover-html="">Last Update</div>{{ formatTime "DateOnly" ( parseTime "RFC3339" (.String "updated_at") ) }}</li>
                            <li data-popover-type="html"><div data-popover-html="">Visibility</div>{{ .String "visibility" }}</li>
                            <li data-popover-type="html"><div data-popover-html="">Stars</div>{{ .Int "stargazers_count" }}✩</li>
                            {{ if .String "language" }}
                            <li data-popover-type="html"><div data-popover-html="">Language</div>{{ .String "language" }}</li>
                            {{ end }}
                          </ul>
                        </li>
                      {{ end }}
                    </ul>
                  </div>

          - size: full
            widgets:
              - type: monitor
                title: Services
                cache: 1m
                sites:
                  - title: Portfolio
                    url: https://phil.opswork.io.vn
                    icon: mdi:home
                    icon-color: "#E04E39"
                  - title: Authentik
                    url: https://authentik.opswork.io.vn
                    icon: si:authentik
                    icon-color: "#FD4B2D"
                  - title: Agro Workflows
                    url: https://argo-workflows.opswork.io.vn
                    icon: sh:argo-cd
                  - title: Agro CD & Kubernetes
                    url: https://argo-cd.opswork.io.vn
                    icon: sh:kubernetes
                  - title: Grafana
                    url: https://grafana.opswork.io.vn
                    icon: sh:grafana
                  - title: Prometheus
                    url: https://prometheus.opswork.io.vn
                    icon: sh:prometheus
                  - title: Portainer
                    url: https://portainer.example.com
                    icon: si:portainer
                  - title: InfluxDB
                    url: https://influx.example.com
                    icon: si:influxdb
                  - title: What's Up Docker
                    url: https://wud.example.com
                    icon: si:docker

          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Infrastructure
                    links:
                      - title: ArgoCD
                        url: https://argocd.example.com
                      - title: Grafana
                        url: https://grafana.example.com
                      - title: Prometheus
                        url: https://prometheus.example.com
  custom.css: |
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

    body {
      font-family: 'IBM Plex Mono', monospace !important;
    }
