apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: metal-lb-ip-pool
  namespace: metallb-system
spec:
  addresses:
    # range of ips for the metalLB inside the K8S to assign for the LB service type
    - 172.18.255.200-172.18.255.220
