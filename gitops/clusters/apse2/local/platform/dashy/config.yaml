apiVersion: v1
kind: ConfigMap
metadata:
  name: dashy-config
  namespace: platform
data:
  conf.yml: |
    appConfig:
      theme: high-constrast-light
      preventWriteToDisk: true
      statusCheck: false
      disableConfigurationForNonAdmin: true
      auth:
        enableGuestAccess: true
      hideComponents:
        hideFooter: true


    pageInfo:
      title: Phil Homelab
      description: Kubernetes • Observability • GitOps
      footerText: Phil Homelab • Kubernetes • Observability • GitOps

    sections:
      - name: Resources
        items:
          - title: GitHub
            description: Source Code, Issues and Pull Requests
            icon: https://cdn.simpleicons.org/github
            url: https://github.com/wisphill

      - name: Monitoring
        items:
          - title: Grafana
            url: https://grafana.opswork.io.vn
            icon: https://cdn.simpleicons.org/grafana

          - title: Prometheus
            url: https://prometheus.opswork.io.vn
            icon: https://cdn.simpleicons.org/prometheus

      - name: GitOps
        items:
          - title: ArgoCD
            url: https://argocd.yuu.dev
            icon: https://cdn.simpleicons.org/argo
          - title: Argo Workflows
            url: https://argo-workflows.opswork.io.vn
            description: Running pipelines, logging in by Authentik
            icon: https://cdn.simpleicons.org/argo

      - name: OIDC & Authentication
        items:
          - title: Authentik
            url: https://authentik.opswork.io.vn
            description: Centralized SSO for authentication
            icon: https://cdn.simpleicons.org/authentik
