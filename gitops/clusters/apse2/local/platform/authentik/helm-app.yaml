apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2026.2.1
    helm:
      values: |
        authentik:
          existingSecret: authentik-secret-key
          existingSecretKey: AUTHENTIK_SECRET_KEY

        postgresql:
          enabled: true

        redis:
          enabled: true

        server:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - authentik.opswork.io.vn

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
