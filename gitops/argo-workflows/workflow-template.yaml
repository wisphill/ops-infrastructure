apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: buildkit-git-image
  namespace: argo-workflows

spec:
  entrypoint: build
  serviceAccountName: workflow-runner
  volumes:
    - name: workspace
      emptyDir: {}

  templates:
    # Workflow entrypoint
    - name: main
      steps:
        - - name: clone
            template: clone
        - - name: build
            template: build
    # Step 1: Clone source
    - name: clone
      container:
        image: alpine/git:v2.45.2
        command:
          - sh
          - -c
        args:
          - |
            git clone https://github.com/wisphill/apps.gin.git /workspace
            echo "testing workflows"
            ls -la /workspace
            echo "testing workflows 2"

        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # Step 2: Build image with BuildKit
    - name: build
      container:
        image: moby/buildkit:v0.25.1-rootless

        command:
          - sh
          - -c

        args:
          - |
            echo "===== BUILD ====="
            pwd
            ls -lah /
            ls -lah /workspace || true
            find /workspace -maxdepth 3 -type f | sort

            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context=/workspace \
              --local dockerfile=/workspace \
              --output type=oci,dest=/workspace/apps-image.tar

        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox

        volumeMounts:
          - name: workspace
            mountPath: /workspace
