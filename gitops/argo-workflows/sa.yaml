apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-runner
  namespace: argo-workflows

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-runner-role
  namespace: argo-workflows
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-runner-binding
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: workflow-runner
    namespace: argo-workflows
roleRef:
  kind: Role
  name: workflow-runner-role
  apiGroup: rbac.authorization.k8s.io
