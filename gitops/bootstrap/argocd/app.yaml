apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      releaseName: argocd
      values: |
        repoServer:
          extraContainers:
            - name: sops
              image: mozilla/sops:3.8.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  cp /usr/local/bin/sops /custom-tools/
              volumeMounts:
                - mountPath: /custom-tools
                  name: custom-tools

          volumes:
            - name: custom-tools
              emptyDir: {}

          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools

        configs:
          cm:
            configManagementPlugins: |
              - name: sops
                generate:
                  command: ["/custom-tools/sops"]
                  args: ["-d", "."]
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
