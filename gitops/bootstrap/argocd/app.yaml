apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      releaseName: argocd
      values: |
        repoServer:
          volumes:
            - name: sops-age-key
              secret:
                secretName: sops-age-key
            - name: cmp-tmp
              emptyDir: {}

          extraContainers:
            - name: sops-plugin
              # This image includes sops and the plugin server
              image: ghcr.io/jkroepke/helm-secrets:v4.6.0
              command: [/var/run/argocd/argocd-cmp-server]
              securityContext:
                runAsUser: 999
              env:
                - name: SOPS_AGE_KEY_FILE
                  value: /home/argocd/.config/sops/age/keys.txt
              volumeMounts:
                - name: var-files
                  mountPath: /var/run/argocd
                - name: cmp-tmp
                  mountPath: /tmp
                - name: sops-age-key
                  mountPath: /home/argocd/.config/sops/age/keys.txt
                  subPath: keys.txt

        configs:
          # We define how the plugin identifies and decrypts your files
          cmp:
            create: true
            plugins:
              sops:
                generate:
                  command: ["sh", "-c"]
                  # This command finds all .yaml files and tries to decrypt them
                  args: ["find . -name '*.yaml' -exec sops -d {} \\;"]
                discover:
                  # This plugin only triggers if it finds a file with 'sops' metadata
                  fileName: "*.yaml"
                  containsText: "sops"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
