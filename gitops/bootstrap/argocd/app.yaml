apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6

    helm:
      releaseName: argocd
      values: |
        repoServer:
          image:
            repository: yuulya/argocd-repo-server
            tag: v2.11.8-ksops
            pullPolicy: Always

          extraContainers:
            - name: argocd-cmp-server
              image: yuulya/argocd-repo-server:v2.11.8-ksops
              command: ["/usr/local/bin/argocd-cmp-server"]
              securityContext:
                runAsNonRoot: true
                runAsUser: 999
              volumeMounts:
                - name: plugins
                  mountPath: /home/argocd/cmp-server/plugins
                - name: cmp-plugin
                  mountPath: /home/argocd/cmp-server/config/plugin.yaml
                  subPath: plugin.yaml
                - name: sops-age-key
                  mountPath: /home/argocd/.config/sops/age

          volumes:
            - name: cmp-plugin
              configMap:
                name: cmp-plugin
            - name: sops-age-key
              secret:
                secretName: sops-age-key

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
