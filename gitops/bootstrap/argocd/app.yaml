apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      releaseName: argocd
      values: |
        repoServer:
          env:
            - name: SOPS_AGE_KEY_FILE
              value: /home/argocd/.config/sops/age/keys.txt
          volumes:
            - name: sops-age-key
              secret:
                secretName: sops-age-key
            - name: custom-tools
              emptyDir: {}
          volumeMounts:
            - name: sops-age-key
              mountPath: /home/argocd/.config/sops/age/keys.txt
              subPath: keys.txt
            - name: custom-tools
              mountPath: /usr/local/bin/ksops
              subPath: ksops

          initContainers:
            - name: install-ksops
              image: viaductoss/ksops:v4.2.0
              command:
                - sh
                - -c
                - cp /usr/local/bin/ksops /custom-tools/ksops
              volumeMounts:
                - name: custom-tools
                  mountPath: /custom-tools
        configs:
          cmp:
            create: true
            plugins:
              ksops:
                generate:
                  command: ["sh", "-c"]
                  args:
                    - ksops -k . && kustomize build .
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
