apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      releaseName: argocd
      values: |
        repoServer:
          env:
            - name: SOPS_AGE_KEY_FILE
              value: /home/argocd/.config/sops/age/keys.txt
          volumes:
            - name: sops-age-key
              secret:
                secretName: sops-age-key
          volumeMounts:
            - name: sops-age-key
              mountPath: /home/argocd/.config/sops/age/keys.txt
              subPath: keys.txt
          initContainers:
            - name: install-ksops
              image: viaductoss/ksops:v4.2.0
              command:
                - sh
                - -c
                - |
                  cp /usr/local/bin/ksops /custom-tools/
              volumeMounts:
                - mountPath: /custom-tools
                  name: custom-tools
          volumes:
            - name: custom-tools
              emptyDir: {}
          volumeMounts:
            - mountPath: /usr/local/bin/ksops
              name: custom-tools
              subPath: ksops
        configs:
          cm:
            kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
