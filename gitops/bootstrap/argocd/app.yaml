apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      releaseName: argocd
      values: |
        repoServer:
          volumes:
            - name: custom-tools
              emptyDir: {}
            - name: sops-age-key
              secret:
                secretName: sops-age-key
          initContainers:
            - name: install-ksops
              image: viaductoss/ksops:v4.3.2
              command: ["/bin/sh", "-c"]
              args:
                - cp /usr/local/bin/ksops /custom-tools/ksops
              volumeMounts:
                - name: custom-tools
                  mountPath: /custom-tools
          volumeMounts:
            - name: custom-tools
              mountPath: /usr/local/bin/ksops
              subPath: ksops
            - name: sops-age-key
              mountPath: /home/argocd/.config/sops/age/keys.txt
              subPath: keys.txt
          env:
            - name: SOPS_AGE_KEY_FILE
              value: /home/argocd/.config/sops/age/keys.txt

        configs:
          cm:
            configManagementPlugins: |
              - name: sops
                generate:
                  command: ["/custom-tools/sops"]
                  args: ["-d", "."]
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
