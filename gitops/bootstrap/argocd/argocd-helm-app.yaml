apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6

    helm:
      releaseName: argocd
      values: |
        server:
          extraArgs:
            - --insecure
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
            hosts:
              - argocd.opswork.io.vn
          env:
            - name: AUTHENTIK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: argocd-custom-secrets
                  key: AUTHENTIK_CLIENT_ID
            - name: AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: argocd-custom-secrets
                  key: AUTHENTIK_CLIENT_SECRET
        # cm:
        #   oidc.config: |
        #     name: AuthentikSSO
        #     issuer: https://authentik.opswork.io.vn/application/o/argo-cd/
        #     clientID: $AUTHENTIK_CLIENT_ID
        #     clientSecret: $AUTHENTIK_CLIENT_SECRET
        #     # Add requested scopes if Authentik requires them
        #     requestedScopes: ["openid", "profile", "email", "groups"]

        repoServer:
          image:
            repository: yuulya/argocd-repo-server
            tag: v2.11.8-ksops
            pullPolicy: IfNotPresent

          extraContainers:
            - name: argocd-cmp-server
              image: yuulya/argocd-repo-server:v2.11.8-ksops
              command: ["/usr/local/bin/argocd-cmp-server"]
              securityContext:
                runAsNonRoot: true
                runAsUser: 999
              volumeMounts:
                - name: plugins
                  mountPath: /home/argocd/cmp-server/plugins
                - name: cmp-plugin
                  mountPath: /home/argocd/cmp-server/config/plugin.yaml
                  subPath: plugin.yaml
                - name: sops-age-key
                  mountPath: /home/argocd/.config/sops/age

          volumes:
            - name: cmp-plugin
              configMap:
                name: cmp-plugin
            - name: sops-age-key
              secret:
                secretName: sops-age-key

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
