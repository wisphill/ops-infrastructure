apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-master
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wisphill/ops-infrastructure
    targetRevision: main
    path: gitops/bootstrap/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy: {}
